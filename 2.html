<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ten tus flores amarillas 🌻</title>
    <style>
        :root {
            /* Atardecer Realista */
            --sky-top: #4a148c;   
            --sky-mid: #ff5252;   
            --sky-bottom: #ffb300; 
            --sun-glow: rgba(255, 200, 0, 0.8);
            
            /* Vegetación optimizada */
            --grass-deep: #0a2e13; 
            --grass-wild: #2e7d32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

        /* Pantalla de Carga (Intro) */
        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .bouquet-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: handOver 3s infinite alternate ease-in-out;
        }

        @keyframes handOver {
            0% { transform: scale(1) translateY(10px) rotate(-3deg); filter: drop-shadow(0 0 20px rgba(255,215,0,0.2)); }
            100% { transform: scale(1.1) translateY(-10px) rotate(3deg); filter: drop-shadow(0 0 40px rgba(255,215,0,0.6)); }
        }

        .paper-wrap {
            width: 70px;
            height: 90px;
            background: linear-gradient(to right, #d4a373, #e6ccb2, #d4a373);
            border-radius: 5px 5px 40% 40%;
            margin-top: -30px;
            z-index: 50;
            clip-path: polygon(0 0, 100% 0, 75% 100%, 25% 100%);
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3);
        }

        #loader p { color: #f1c40f; margin-top: 30px; text-transform: uppercase; letter-spacing: 4px; font-weight: 500; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* Escenario Principal */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%);
            display: none;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            bottom: 15%;
            left: 50%;
            width: 160px;
            height: 160px;
            background: #fff9c4;
            border-radius: 50%;
            transform: translateX(-50%);
            filter: blur(2px);
            box-shadow: 0 0 80px var(--sun-glow), 0 0 200px #ff5252;
            z-index: 1;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 230, 230, 0.15);
            filter: blur(20px);
            border-radius: 50%;
            animation: drift linear infinite;
        }
        @keyframes drift { from { left: -200px; } to { left: 110vw; } }

        /* Profundidad de Campo */
        .deep-background {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, var(--grass-deep) 0%, #154721 50%, transparent 100%);
            z-index: 2;
        }

        #garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .grass-blade {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to top, var(--grass-deep), var(--grass-wild));
            border-radius: 5px 5px 0 0;
            transform-origin: bottom center;
            will-change: transform;
        }
        .grass-front { animation: swayGrass 3s ease-in-out infinite alternate; z-index: 15; width: 5px; }
        .grass-back { animation: swayGrass 5s ease-in-out infinite alternate-reverse; z-index: 3; filter: brightness(0.6); }

        @keyframes swayGrass { from { transform: rotate(-4deg); } to { transform: rotate(4deg); } }

        /* --- FLORES --- */
        .flower {
            position: absolute;
            bottom: -10px;
            transform-origin: bottom center;
            transition: filter 0.3s;
        }

        .flower-head {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sunflower-head { width: 100px; height: 100px; cursor: pointer; }
        .sunflower-head:hover { filter: brightness(1.2) drop-shadow(0 0 10px rgba(255,215,0,0.8)); }

        .sunflower-petal {
            position: absolute;
            background: linear-gradient(to top, #fbc02d, #fff176);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            bottom: 50%;
        }

        .sunflower-petal.layer-1 { width: 20px; height: 50px; z-index: 1; }
        .sunflower-petal.layer-2 { width: 16px; height: 40px; filter: brightness(0.95); z-index: 2; }
        .sunflower-petal.layer-3 { width: 12px; height: 30px; filter: brightness(0.85); z-index: 3; }

        .flower-center {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #4e342e 20%, #261712 100%);
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 0 8px #000;
            background-image: repeating-radial-gradient(circle at center, transparent 0, transparent 2px, rgba(0,0,0,0.5) 3px, transparent 4px);
        }

        .stem {
            width: 6px;
            background: linear-gradient(to right, #154721, #2e7d32);
            margin: -5px auto 0;
            border-radius: 4px;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 30px;
            height: 15px;
            background: linear-gradient(to bottom, #2e7d32, #1b5e20);
            border-radius: 20px 0;
        }

        .tulip-head { width: 35px; height: 45px; }
        .tulip-petal { position: absolute; background: #ff80ab; width: 15px; height: 40px; border-radius: 50% 50% 15% 15%; bottom: 0; transform-origin: bottom center; }
        .wildflower-head { width: 30px; height: 30px; }
        .wildflower-petal { position: absolute; background: #ce93d8; width: 8px; height: 20px; border-radius: 50% 50% 0 0; bottom: 50%; transform-origin: bottom center; }

        /* --- CONEJOS Y ABEJA --- */
        .bunny {
            position: absolute;
            bottom: 40px;
            width: 45px;
            height: 30px;
            background: #f5f5f5;
            border-radius: 50% 50% 40% 40%;
            z-index: 20;
            box-shadow: inset -5px -2px 10px #ccc;
        }
        .ear { position: absolute; width: 8px; height: 18px; background: #f5f5f5; top: -12px; left: 8px; border-radius: 50% 50% 0 0; }
        .bunny-detail { position: absolute; width: 3px; height: 3px; background: #222; border-radius: 50%; top: 8px; left: 8px; box-shadow: 18px 0 0 #222; }

        .bee {
            position: absolute; width: 16px; height: 10px; background: #ffcc00; border-radius: 50%; z-index: 600;
            animation: beeFlight 4s ease-in-out infinite; opacity: 0; pointer-events: none;
        }
        .bee::after { content: ''; position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 3px, #000 3px, #000 5px); border-radius: 50%; }
        .wing { position: absolute; top: -6px; left: 4px; width: 8px; height: 10px; background: rgba(255,255,255,0.8); border-radius: 50%; animation: flap 0.1s infinite alternate; }
        
        @keyframes flap { from { transform: rotateY(0deg); } to { transform: rotateY(60deg); } }
        @keyframes beeFlight { 0% { transform: translate(-30px, -20px) rotate(-10deg); } 50% { transform: translate(30px, 10px) rotate(10deg); } 100% { transform: translate(-30px, -20px) rotate(-10deg); } }

        /* --- INTERFAZ DE ZOOM (Mensaje en la flor) --- */
        #zoom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 500; backdrop-filter: blur(8px);
        }
        .zoomed-flower-container {
            position: relative; transform: scale(3.5); transition: transform 0.6s ease; cursor: pointer;
        }
        
        /* Texto SOBRE la flor */
        #flower-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 5px #000, 0 0 20px rgba(0,0,0,0.9);
            z-index: 700;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none; /* Deja que el clic pase a la flor */
            width: 80%;
            line-height: 1.2;
        }
        #flower-text.show { opacity: 1; }

        .sway { animation: sway 4s ease-in-out infinite alternate; }
        @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }
    </style>
</head>
<body>

<audio id="bgm" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="loader">
    <div class="bouquet-container">
        <div id="intro-flower-wrapper"></div>
        <div class="paper-wrap"></div>
    </div>
    <p>Ten tus flores amarillas</p>
</div>

<div id="stage">
    <div class="deep-background"></div>
    <div class="sun"></div>
    <div id="clouds"></div>
    <div id="garden"></div>
    
    <div id="bunny1" class="bunny"><div class="ear"></div><div class="ear" style="left: 20px;"></div><div class="bunny-detail"></div></div>
    <div id="bunny2" class="bunny" style="background: #e0e0e0; transform: scale(0.8);"><div class="ear"></div><div class="ear" style="left: 20px;"></div><div class="bunny-detail"></div></div>
</div>

<div id="zoom-overlay">
    <div class="bee" id="bee"><div class="wing"></div><div class="wing" style="left: 6px; animation-delay: 0.05s;"></div></div>
    <div class="zoomed-flower-container" id="zoom-content" title="Toca la flor para volver al jardín"></div>
    <div id="flower-text"></div>
</div>

<script>
    // Variables principales
    const stage = document.getElementById('stage');
    const loader = document.getElementById('loader');
    const garden = document.getElementById('garden');
    const bgm = document.getElementById('bgm');
    const zoomOverlay = document.getElementById('zoom-overlay');
    const zoomContent = document.getElementById('zoom-content');
    const bee = document.getElementById('bee');
    const flowerText = document.getElementById('flower-text');

    const phrases = [
        "Un detalle\npara alegrar\ntu día 💛",
        "Tu amistad\nes mi paisaje\nfavorito ✨",
        "Gracias\npor florecer\na mi lado 🌼",
        "Brillas\nmás que este\natardecer 🌻"
    ];

    const FLOWER_TYPES = { SUNFLOWER: 0, TULIP: 1, WILDFLOWER: 2 };

    function createOrganicSunflower() {
        const head = document.createElement('div');
        head.className = 'flower-head sunflower-head';
        
        const layers = [
            { count: 16, class: 'layer-1', offset: 0 },
            { count: 12, class: 'layer-2', offset: 10 },
            { count: 8, class: 'layer-3', offset: 5 }
        ];

        layers.forEach(l => {
            for (let i = 0; i < l.count; i++) {
                const p = document.createElement('div');
                p.className = `sunflower-petal ${l.class}`;
                p.style.transform = `rotate(${(i * (360 / l.count)) + l.offset}deg)`;
                head.appendChild(p);
            }
        });

        const center = document.createElement('div');
        center.className = 'flower-center';
        head.appendChild(center);
        return head;
    }

    function createPetalStructure(type) {
        if (type === FLOWER_TYPES.SUNFLOWER) return createOrganicSunflower();

        const head = document.createElement('div');
        head.className = 'flower-head';
        
        if (type === FLOWER_TYPES.TULIP) {
            head.classList.add('tulip-head');
            for (let i = 0; i < 3; i++) {
                const p = document.createElement('div');
                p.className = 'tulip-petal';
                p.style.transform = `rotate(${i * 20 - 20}deg)`;
                p.style.left = (i*4) + 'px';
                head.appendChild(p);
            }
        } else {
            head.classList.add('wildflower-head');
            for (let i = 0; i < 5; i++) {
                const p = document.createElement('div');
                p.className = 'wildflower-petal';
                p.style.transform = `rotate(${i * 72}deg)`;
                head.appendChild(p);
            }
        }
        return head;
    }

    function createFlower(type, x, z) {
        const wrap = document.createElement('div');
        wrap.className = 'flower sway';
        
        const isSun = type === FLOWER_TYPES.SUNFLOWER;
        const zIndex = isSun ? Math.floor(z) + 50 : Math.floor(z);
        const heightBase = isSun ? 130 + (z * 1.5) : 80 + (z * 1.5);
        const scaleBase = isSun ? 0.7 + (z / 100) : 0.5 + (z / 100);

        wrap.style.left = x + '%';
        wrap.style.zIndex = zIndex;
        wrap.style.transform = `scale(${scaleBase})`;
        wrap.style.animationDelay = -(Math.random() * 5) + 's';

        const head = createPetalStructure(type);
        wrap.appendChild(head);

        const stem = document.createElement('div');
        stem.className = 'stem';
        stem.style.height = heightBase + 'px';
        
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.style.top = '40%';
        leaf.style.left = '5px';
        stem.appendChild(leaf);
        
        if(isSun) {
            const leaf2 = document.createElement('div');
            leaf2.className = 'leaf';
            leaf2.style.top = '65%';
            leaf2.style.left = '-25px';
            leaf2.style.transform = 'scaleX(-1)';
            stem.appendChild(leaf2);
            
            // Evento click solo en los girasoles
            head.onclick = (e) => {
                e.stopPropagation();
                openZoom(head.cloneNode(true));
            }
        }

        wrap.appendChild(stem);
        return wrap;
    }

    function generateEnvironment() {
        // Optimizado: Menos pasto para evitar pantallas en blanco, pero suficiente para profundidad
        for (let i = 0; i < 150; i++) {
            const blade = document.createElement('div');
            const z = Math.random() * 100;
            blade.className = z < 40 ? 'grass-blade grass-back' : 'grass-blade grass-front';
            blade.style.left = Math.random() * 100 + '%';
            blade.style.height = (z < 40 ? 30 + Math.random()*40 : 60 + Math.random()*60) + 'px';
            blade.style.zIndex = Math.floor(z);
            blade.style.animationDelay = -(Math.random() * 5) + 's';
            garden.appendChild(blade);
        }

        // Optimizado: 50 flores en total para mejor rendimiento
        for(let i=0; i<50; i++){
            const x = Math.random() * 100;
            const z = Math.random() * 100;
            let type;
            const rng = Math.random();
            if(rng < 0.40) type = FLOWER_TYPES.SUNFLOWER; 
            else if(rng < 0.70) type = FLOWER_TYPES.TULIP;
            else type = FLOWER_TYPES.WILDFLOWER; 
            
            garden.appendChild(createFlower(type, x, z));
        }
    }

    function openZoom(flowerHeadClone) {
        zoomContent.innerHTML = '';
        zoomContent.appendChild(flowerHeadClone);
        
        // El clic en la flor grande cierra el zoom
        zoomContent.onclick = closeZoom;
        
        bee.style.opacity = '0';
        zoomOverlay.style.display = 'flex';
        
        setTimeout(() => {
            bee.style.opacity = '1';
            // Configurar mensaje
            flowerText.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            flowerText.classList.add('show');
        }, 500);
    }

    function closeZoom() {
        flowerText.classList.remove('show');
        bee.style.opacity = '0';
        setTimeout(() => { zoomOverlay.style.display = 'none'; }, 400);
    }

    loader.onclick = () => {
        loader.style.opacity = '0';
        bgm.play().catch(() => {});
        setTimeout(() => {
            loader.style.display = 'none';
            stage.style.display = 'block';
            
            for(let i=0; i<5; i++){
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.width = (200 + Math.random()*200) + 'px';
                c.style.height = '100px';
                c.style.top = (Math.random()*35) + '%';
                c.style.animationDuration = (40 + Math.random()*60) + 's';
                c.style.animationDelay = -(Math.random()*40) + 's';
                document.getElementById('clouds').appendChild(c);
            }
            generateEnvironment();
        }, 800);
    }

    function animateBunny(bunnyId, speed, jumpHeight) {
        let x = -100;
        const b = document.getElementById(bunnyId);
        function move() {
            x += speed;
            if (x > window.innerWidth + 100) x = -100;
            b.style.left = x + 'px';
            b.style.bottom = (40 + Math.abs(Math.sin(x / 15) * jumpHeight)) + 'px';
            requestAnimationFrame(move);
        }
        move();
    }
    
    setTimeout(() => {
        animateBunny('bunny1', 1.2, 20);
        setTimeout(() => animateBunny('bunny2', 1.0, 25), 3000);
    }, 1500);

    // Flor para el ramo inicial
    const introFlower = createOrganicSunflower();
    introFlower.style.transform = 'scale(0.8)';
    introFlower.style.zIndex = '100';
    document.getElementById('intro-flower-wrapper').appendChild(introFlower);
    
</script>
</body>
</html>
