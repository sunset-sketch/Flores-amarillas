<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flores Amarillas para Ti 🌻</title>
    <style>
        :root {
            --sky: linear-gradient(to bottom, #2d1b4d 0%, #e65100 60%, #ffb300 100%);
            --grass-dark: #0a260f;
            --grass-light: #1b5e20;
            --yellow-bright: #fbc02d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }

        /* Pantalla de Carga */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; cursor: pointer;
        }
        .bouquet { animation: float 3s infinite ease-in-out; text-align: center; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #loader p { color: gold; margin-top: 20px; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }

        /* Escenario */
        #stage { position: relative; width: 100%; height: 100%; background: var(--sky); display: none; }
        
        /* Sol de atardecer tapado */
        .sun {
            position: absolute; bottom: 25%; left: 50%;
            width: 250px; height: 250px; background: #fff176;
            border-radius: 50%; transform: translateX(-50%);
            filter: blur(30px); opacity: 0.6; z-index: 1;
        }

        /* Texto Poético Tipo Máquina de Escribir */
        #sky-writer {
            position: absolute; top: 10%; left: 10%; right: 10%;
            color: #fff; font-size: clamp(16px, 4vw, 22px);
            line-height: 1.6; text-align: center; font-style: italic;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); z-index: 5;
            min-height: 100px;
        }

        /* Campo y Suelo */
        #garden { position: absolute; bottom: 0; width: 100%; height: 100%; z-index: 10; }
        
        .ground-base {
            position: absolute; bottom: 0; width: 100%; height: 25%;
            background: linear-gradient(to top, #051a08 0%, transparent 100%);
            z-index: 2;
        }

        .grass-blade {
            position: absolute; bottom: 0; width: 3px;
            background: linear-gradient(to top, var(--grass-dark), var(--grass-light));
            border-radius: 2px; transform-origin: bottom;
            animation: sway 3s infinite ease-in-out alternate;
        }

        /* Flores */
        .flower { position: absolute; bottom: 0; transform-origin: bottom center; }
        .flower-head { position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* Girasoles Gigantes */
        .sunflower-main { transform: scale(1.8); z-index: 100 !important; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        .petal { position: absolute; background: linear-gradient(to top, #fbc02d, #fff176); border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; transform-origin: bottom center; bottom: 50%; }
        .center { position: absolute; background: radial-gradient(circle, #3e2723, #1b1102); border-radius: 50%; z-index: 10; box-shadow: inset 0 0 10px #000; }

        /* Mensaje dentro de la flor */
        .flower-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 14px; font-weight: bold; text-align: center;
            width: 80px; opacity: 0; transition: opacity 0.5s; pointer-events: none;
            z-index: 20; text-shadow: 1px 1px 3px #000; line-height: 1.1;
        }
        .flower-msg.show { opacity: 1; }

        .stem { width: 8px; background: linear-gradient(to right, #1b5e20, #2e7d32); border-radius: 4px; margin: -5px auto 0; }

        /* Animaciones */
        @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }

        #zoom-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; z-index: 500; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<audio id="bgm" loop><source src="musica.mp3" type="audio/mpeg"></audio>

<div id="loader">
    <div class="bouquet" id="intro-flower"></div>
    <p>Toca para abrir tu jardín 💛</p>
</div>

<div id="stage">
    <div class="sun"></div>
    <div id="sky-writer"></div>
    <div class="ground-base"></div>
    <div id="garden"></div>
</div>

<div id="zoom-bg"></div>

<script>
    const stage = document.getElementById('stage');
    const loader = document.getElementById('loader');
    const garden = document.getElementById('garden');
    const skyWriter = document.getElementById('sky-writer');
    const bgm = document.getElementById('bgm');

    const poeticText = "En este día tan especial, donde el amarillo de los girasoles ilumina cada rincón, quiero regalarte este jardín eterno... 🌻 Porque una amistad como la tuya es el regalo más sincero que la vida me ha dado. Gracias por ser esa luz constante y por hacer que cada momento brille. ¡Feliz día de las flores amarillas! ✨💛";

    const friendshipPhrases = [
        "¡Feliz día de\nlas flores\namarillas! 🌻",
        "¡Gracias por\ntu hermosa\namistad! 💛",
        "Eres una\npersona\nincreíble ✨",
        "Tu amistad\nes muy\nvaliosa 🌼"
    ];

    function typeWriter(text, i = 0) {
        if (i < text.length) {
            skyWriter.innerHTML += text.charAt(i);
            setTimeout(() => typeWriter(text, i + 1), 60);
        }
    }

    function createPetals(head, isBig) {
        const count = isBig ? 18 : 12;
        const size = isBig ? {w: 25, h: 60} : {w: 12, h: 30};
        for(let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.width = size.w + 'px';
            p.style.height = size.h + 'px';
            p.style.transform = `rotate(${i * (360/count)}deg)`;
            head.appendChild(p);
        }
        const center = document.createElement('div');
        center.className = 'center';
        center.style.width = (isBig ? 50 : 20) + 'px';
        center.style.height = (isBig ? 50 : 20) + 'px';
        head.appendChild(center);
    }

    function addFlower(x, z, phrase = null) {
        const isBig = phrase !== null;
        const wrap = document.createElement('div');
        wrap.className = 'flower';
        wrap.style.left = x + '%';
        wrap.style.bottom = '-5px';
        wrap.style.zIndex = Math.floor(z);
        if(isBig) wrap.classList.add('sunflower-main');
        else wrap.style.transform = `scale(${0.4 + (z/150)})`;

        const head = document.createElement('div');
        head.className = 'flower-head';
        createPetals(head, isBig);

        if(isBig) {
            const msg = document.createElement('div');
            msg.className = 'flower-msg';
            msg.innerText = phrase;
            head.appendChild(msg);

            head.onclick = (e) => {
                e.stopPropagation();
                msg.classList.toggle('show');
                head.style.transform = msg.classList.contains('show') ? 'scale(1.2)' : 'scale(1)';
            };
        }

        const stem = document.createElement('div');
        stem.className = 'stem';
        stem.style.height = (isBig ? 120 : 60) + (z*0.5) + 'px';
        
        wrap.appendChild(head);
        wrap.appendChild(stem);
        garden.appendChild(wrap);
    }

    function init() {
        // Hierba de fondo (Suelo lleno)
        for(let i=0; i<120; i++) {
            const grass = document.createElement('div');
            grass.className = 'grass-blade';
            grass.style.left = Math.random() * 100 + '%';
            grass.style.height = (30 + Math.random() * 70) + 'px';
            grass.style.bottom = '0';
            grass.style.opacity = 0.6;
            grass.style.zIndex = Math.floor(Math.random()*50);
            garden.appendChild(grass);
        }

        // Flores pequeñas decorativas
        for(let i=0; i<40; i++) {
            addFlower(Math.random()*100, Math.random()*80);
        }

        // Los 4 Girasoles Gigantes
        const positions = [15, 38, 62, 85];
        positions.forEach((pos, i) => {
            addFlower(pos, 150, friendshipPhrases[i]);
        });
    }

    loader.onclick = () => {
        loader.style.opacity = '0';
        bgm.play().catch(() => {});
        setTimeout(() => {
            loader.style.display = 'none';
            stage.style.display = 'block';
            init();
            setTimeout(() => typeWriter(poeticText), 1000);
        }, 500);
    };

    // Flor del principio
    const introHead = document.createElement('div');
    introHead.className = 'flower-head sunflower-main';
    createPetals(introHead, true);
    document.getElementById('intro-flower').appendChild(introHead);
</script>
</body>
</html>
